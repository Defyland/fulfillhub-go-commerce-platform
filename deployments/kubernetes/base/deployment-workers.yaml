apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillhub-worker-inventory
  namespace: fulfillhub
  labels:
    app.kubernetes.io/name: fulfillhub-worker-inventory
    app.kubernetes.io/part-of: fulfillhub-commerce
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: fulfillhub-worker-inventory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fulfillhub-worker-inventory
        app.kubernetes.io/part-of: fulfillhub-commerce
    spec:
      serviceAccountName: fulfillhub-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/defyland/fulfillhub-go-commerce-platform:sha-placeholder
          imagePullPolicy: IfNotPresent
          command:
            - /app/fulfillhub-worker
          env:
            - name: WORKER_QUEUE
              value: inventory.reserve
            - name: CONSUMER_NAME
              value: inventory-worker
          envFrom:
            - configMapRef:
                name: fulfillhub-config
            - secretRef:
                name: fulfillhub-runtime
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
