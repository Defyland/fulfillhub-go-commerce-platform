apiVersion: batch/v1
kind: Job
metadata:
  name: fulfillhub-migrate
  namespace: fulfillhub
  labels:
    app.kubernetes.io/name: fulfillhub-migrate
    app.kubernetes.io/part-of: fulfillhub-commerce
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fulfillhub-migrate
        app.kubernetes.io/part-of: fulfillhub-commerce
    spec:
      restartPolicy: Never
      serviceAccountName: fulfillhub-runtime
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/defyland/fulfillhub-go-commerce-platform:sha-placeholder
          imagePullPolicy: IfNotPresent
          command:
            - /app/fulfillhub-migrate
          envFrom:
            - configMapRef:
                name: fulfillhub-config
            - secretRef:
                name: fulfillhub-runtime
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
