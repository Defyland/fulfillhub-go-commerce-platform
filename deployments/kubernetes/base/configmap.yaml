apiVersion: v1
kind: ConfigMap
metadata:
  name: fulfillhub-config
  namespace: fulfillhub
  labels:
    app.kubernetes.io/name: fulfillhub
    app.kubernetes.io/part-of: fulfillhub-commerce
data:
  HTTP_ADDR: ":8080"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://otel-collector:4318/v1/traces"
  OTEL_SERVICE_NAME: "fulfillhub"
  OPS_JWT_ISSUER: "https://ops.fulfillhub.example"
  OPS_JWT_AUDIENCE: "fulfillhub-ops"
  RATE_LIMIT_PER_MINUTE: "600"
  OUTBOX_RELAY_BATCH_SIZE: "100"
  OUTBOX_RELAY_INTERVAL: "250ms"
  MIGRATION_TIMEOUT: "60s"
