services:
  api:
    build: .
    command: ["/app/fulfillhub-api"]
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  outbox-relay:
    build: .
    command: ["/app/fulfillhub-outbox-relay"]
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-worker:
    build: .
    command: ["/app/fulfillhub-worker"]
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: inventory.reserve
      CONSUMER_NAME: inventory-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payments-worker:
    build: .
    command: ["/app/fulfillhub-worker"]
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: payments.authorize
      CONSUMER_NAME: payments-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  shipments-worker:
    build: .
    command: ["/app/fulfillhub-worker"]
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: shipments.create
      CONSUMER_NAME: shipments-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  orders-finalizer:
    build: .
    command: ["/app/fulfillhub-worker"]
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: orders.finalize
      CONSUMER_NAME: orders-finalizer
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fulfillhub
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fulfillhub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulfillhub -d fulfillhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.4
    ports:
      - "3000:3000"
    volumes:
      - ./docs/observability/grafana-dashboard.json:/var/lib/grafana/dashboards/fulfillhub.json:ro
    depends_on:
      - prometheus
