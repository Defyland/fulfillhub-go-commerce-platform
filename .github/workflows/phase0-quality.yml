name: project-quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate repository baseline
        run: ./scripts/validate_phase0.sh
      - name: Validate shell scripts
        run: sh -n scripts/validate_phase0.sh scripts/run_compose_profile.sh

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Formatting check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Unit and request tests
        run: go test ./...
      - name: Coverage
        run: go test -cover ./...
      - name: Race detector
        run: go test -race ./...
      - name: Native benchmark smoke
        run: go test -bench=. -run '^$' -benchtime=1x ./internal/api

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fulfillhub
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fulfillhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: PostgreSQL integration tests
        env:
          DATABASE_URL: postgres://fulfillhub:postgres@localhost:5432/fulfillhub_test?sslmode=disable
        run: go test ./internal/postgres -run TestPostgresStoreIntegration -count=1

  rabbitmq-integration:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: RabbitMQ integration tests
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: go test ./internal/messaging -run TestRabbitPublisherIntegration -count=1

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker build
        run: docker build .
      - name: Validate Compose config
        run: docker compose config

  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate k6 scripts are present
        run: test -f benchmarks/k6/smoke.js && test -f benchmarks/k6/load.js && test -f benchmarks/k6/stress.js && test -f benchmarks/k6/spike.js

  compose-profile-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare k6 wrapper
        run: |
          mkdir -p .ci-bin
          cat > .ci-bin/k6 <<'EOF'
          #!/usr/bin/env sh
          exec docker run --rm --network host \
            -e BASE_URL \
            -e K6_SUMMARY_EXPORT \
            -v "$PWD:/work" \
            -w /work \
            grafana/k6:0.54.0 "$@"
          EOF
          chmod +x .ci-bin/k6
      - name: Run Compose smoke profile
        env:
          SCENARIOS: smoke
          RESULT_ROOT: benchmarks/results/ci
        run: PATH="$PWD/.ci-bin:$PATH" ./scripts/run_compose_profile.sh
      - name: Upload Compose profile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-profile-smoke
          path: benchmarks/results/ci/

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: stoplightio/spectral-action@v0.8.6
        with:
          file_glob: openapi.yaml

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
