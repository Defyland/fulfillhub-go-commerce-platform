name: project-quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate repository baseline
        run: ./scripts/validate_phase0.sh

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Formatting check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Unit and request tests
        run: go test ./...
      - name: Coverage
        run: go test -cover ./...
      - name: Race detector
        run: go test -race ./...
      - name: Native benchmark smoke
        run: go test -bench=. -run '^$' -benchtime=1x ./internal/api

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker build
        run: docker build .

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: stoplightio/spectral-action@v0.8.6
        with:
          file_glob: openapi.yaml

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
