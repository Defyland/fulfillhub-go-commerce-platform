name: fulfillhub-go-commerce-platform
services:
  api:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-api
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
      redis:
        condition: service_started
        required: true
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      HTTP_ADDR: :8080
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RATE_LIMIT_PER_MINUTE: "60000"
      REDIS_URL: redis://redis:6379/0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "28080"
        protocol: tcp
  compensation-worker:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      CONSUMER_NAME: compensation-worker
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: orders.compensate
    networks:
      default: null
  grafana:
    depends_on:
      prometheus:
        condition: service_started
        required: true
    image: grafana/grafana:11.1.4
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3000
        published: "13000"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform/docs/observability/grafana-dashboard.json
        target: /var/lib/grafana/dashboards/fulfillhub.json
        read_only: true
        bind:
          create_host_path: true
  inventory-worker:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      CONSUMER_NAME: inventory-worker
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: inventory.reserve
    networks:
      default: null
  notifications-worker:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      CONSUMER_NAME: notifications-worker
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: notifications.email
    networks:
      default: null
  orders-finalizer:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      CONSUMER_NAME: orders-finalizer
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: orders.finalize
    networks:
      default: null
  outbox-relay:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-outbox-relay
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      OUTBOX_RELAY_BATCH_SIZE: "1000"
      OUTBOX_RELAY_INTERVAL: 100ms
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      default: null
  payments-worker:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      CONSUMER_NAME: payments-worker
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: payments.authorize
    networks:
      default: null
  postgres:
    environment:
      POSTGRES_DB: fulfillhub
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: fulfillhub
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U fulfillhub -d fulfillhub
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 10s
    image: postgres:16-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "15432"
        protocol: tcp
  prometheus:
    depends_on:
      api:
        condition: service_started
        required: true
    image: prom/prometheus:v2.54.1
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9090
        published: "19090"
        protocol: tcp
    volumes:
      - type: bind
        source: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform/deployments/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
        bind:
          create_host_path: true
  rabbitmq:
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      timeout: 5s
      interval: 10s
      retries: 10
      start_period: 20s
    image: rabbitmq:3.13-management-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5672
        published: "15674"
        protocol: tcp
      - mode: ingress
        target: 15672
        published: "15673"
        protocol: tcp
  redis:
    image: redis:7-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 6379
        published: "16379"
        protocol: tcp
  shipments-worker:
    build:
      context: /Users/allanflavio/Documents/projects/PERSONAL/backend-challenges/fulfillhub-go-commerce-platform
      dockerfile: Dockerfile
    command:
      - /app/fulfillhub-worker
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_started
        required: true
    environment:
      CONSUMER_NAME: shipments-worker
      DATABASE_URL: postgres://fulfillhub:postgres@postgres:5432/fulfillhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WORKER_QUEUE: shipments.create
    networks:
      default: null
networks:
  default:
    name: fulfillhub-go-commerce-platform_default
